services:

  postgres:
    image: postgres:17-alpine
    container_name: otp-postgres
    environment:
      POSTGRES_DB: otpdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d otpdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: otp-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/otpdb
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    volumes:
      - ./otp-codes.txt:/app/otp-codes.txt
      - ./logs:/app/logs

volumes:
  postgres_data:
